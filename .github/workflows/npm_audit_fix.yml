name: NPM Audit Fix

on:
    workflow_dispatch:

jobs:
    audit-fix:
        runs-on: ubuntu-latest
        outputs:
            audit: ${{ steps.audit.outputs.audit }}
        permissions:
            contents: write
            pull-requests: write

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: ".nvmrc"

            - name: Run npm audit fix
              id: audit
              run: |
                  npm install --no-audit --ignore-scripts
                  audit=$(npm audit fix --ignore-scripts) || echo "npm audit fix encountered more vulnerabilities."

            - name: Create Pull Request
              id: cpr
              uses: peter-evans/create-pull-request@v8
              with:
                  token: ${{ secrets.GIT_TOKEN }}
                  commit-message: "[auto-generated]: npm audit fix"
                  branch: audit-fix-${{ github.run_id }}
                  delete-branch: true
                  title: "[auto-generated]: npm audit fix"
                  body: |
                      ${AUDIT}
                  labels: |
                      automated
              env:
                  AUDIT: ${{ steps.audit.outputs.audit }}
