@if (showButton()) {
    @let info = siteInfo();
    <core-user-avatar [userId]="info?.userid" [url]="info?.userpictureurl"
        [firstname]="info?.firstname" [lastname]="info?.lastname" [fullname]="info?.fullname"
        [linkProfile]="false" class="core-bar-button-image clickable" (ariaButtonClick)="openUserMenu($event)"
        [attr.aria-label]="'core.user.useraccount' | translate" />
}
